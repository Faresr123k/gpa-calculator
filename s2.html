<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة معدل السداسي الثاني - علوم اجتماعية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 950px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #008080;
            margin-bottom: 5px;
        }
        h3 {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-weight: normal;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }
        th, td {
            padding: 12px 10px;
            text-align: right;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #008080;
            color: white;
            font-size: 15px;
        }
        input[type="number"] {
            width: 75px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
        }
        input[type="number"]:focus {
            border-color: #008080;
            outline: none;
        }
        .btn-calc {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #008080;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-calc:hover {
            background-color: #005a5a;
        }
        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            display: none;
        }
        .pass {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .fail {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .text-pass { color: #28a745; font-weight: bold; }
        .text-fail { color: #dc3545; font-weight: bold; }
        .disabled-input {
            background-color: #e9ecef;
            color: #6c757d;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>حاسبة معدل السداسي الثاني</h1>
    <h3>جامعة الجزائر 2 - كلية العلوم الاجتماعية</h3>
    
    <table>
        <thead>
            <tr>
                <th>المقياس</th>
                <th>نوع المادة</th>
                <th>المعامل</th>
                <th>علامة التقييم المستمر (TD)</th>
                <th>علامة الامتحان الرئيسي</th>
                <th>معدل المادة</th>
            </tr>
        </thead>
        <tbody id="subjects-table">
            <!-- سيتم بناء الجدول آلياً بتعديلاتك الدقيقة -->
        </tbody>
    </table>

    <button class="btn-calc" onclick="calculateGPA()">احسب المعدل الفصلي الحالي</button>

    <div id="result" class="result-box"></div>
</div>

<script>
    // توزيع المواد الجديد والنهائي بناءً على تعديلاتك الصحيحة تماماً
    const subjects = [
        { name: "مدخل إلى علم السكان (Démographie)", coeff: 2, hasTd: true, hasExam: true },
        { name: "مدخل إلى الأرطوفونيا (L'Orthophonie)", coeff: 2, hasTd: true, hasExam: true },
        { name: "مدخل إلى علوم التربية (Sciences de l'éducation)", coeff: 2, hasTd: true, hasExam: true },
        { name: "منهجية البحث العلمي (Méthodologie)", coeff: 2, hasTd: true, hasExam: true },
        { name: "إحصاء استدلالي (Statistiques inférentielle)", coeff: 2, hasTd: true, hasExam: true },
        { name: "تاريخ الجزائر 2", coeff: 1, hasTd: false, hasExam: true },
        { name: "البحث الوثائقي 2", coeff: 1, hasTd: false, hasExam: true },
        { name: "لغة إنجليزية", coeff: 1, hasTd: true, hasExam: false },
        { name: "مدخل إلى البرمجة والذكاء الاصطناعي", coeff: 1, hasTd: true, hasExam: false },
        { name: "تيارات فكرية كبرى (Grands courants)", coeff: 2, hasTd: true, hasExam: true }
    ];

    const tableBody = document.getElementById('subjects-table');

    // إنشاء أسطر الجدول
    subjects.forEach((sub, index) => {
        let typeText = (sub.hasTd && sub.hasExam) ? "محاضرة + TD" : (sub.hasTd ? "TD فقط" : "محاضرة فقط");
        
        let tdInput = sub.hasTd 
            ? `<input type="number" id="td-${index}" placeholder="0.00" step="0.01" min="0" max="20" oninput="updateRow(${index})">` 
            : `<input type="text" value="—" class="disabled-input" readonly style="width:75px; text-align:center; border:1px solid #ccc; border-radius:4px; padding:6px;">`;
            
        let examInput = sub.hasExam 
            ? `<input type="number" id="exam-${index}" placeholder="0.00" step="0.01" min="0" max="20" oninput="updateRow(${index})">` 
            : `<input type="text" value="—" class="disabled-input" readonly style="width:75px; text-align:center; border:1px solid #ccc; border-radius:4px; padding:6px;">`;
        
        let row = `
            <tr>
                <td><strong>${sub.name}</strong></td>
                <td><small style="color:#555;">${typeText}</small></td>
                <td><strong style="font-size:15px;">${sub.coeff}</strong></td>
                <td>${tdInput}</td>
                <td>${examInput}</td>
                <td id="sub-total-${index}" style="font-weight:bold;">0.00</td>
            </tr>
        `;
        tableBody.innerHTML += row;
    });

    // حساب معدل المادة الواحدة بدقة
    function updateRow(index) {
        const sub = subjects[index];
        let finalScore = 0;

        if (sub.hasTd && sub.hasExam) {
            const td = parseFloat(document.getElementById(`td-${index}`).value) || 0;
            const exam = parseFloat(document.getElementById(`exam-${index}`).value) || 0;
            // احتساب قاعدة الـ 40% والـ 60%
            finalScore = (td * 0.4) + (exam * 0.6);
        } else if (sub.hasTd) {
            finalScore = parseFloat(document.getElementById(`td-${index}`).value) || 0;
        } else if (sub.hasExam) {
            finalScore = parseFloat(document.getElementById(`exam-${index}`).value) || 0;
        }

        const cell = document.getElementById(`sub-total-${index}`);
        cell.innerText = finalScore.toFixed(2);
        
        if (finalScore >= 10) {
            cell.className = "text-pass";
        } else {
            cell.className = "text-fail";
        }
        return finalScore;
    }

    // حساب المعدل الإجمالي للسداسي
    function calculateGPA() {
        let totalPoints = 0;
        let totalCoeffs = 0;

        subjects.forEach((sub, index) => {
            let finalScore = updateRow(index);
            totalPoints += finalScore * sub.coeff;
            totalCoeffs += sub.coeff;
        });

        const gpa = totalPoints / totalCoeffs;
        const resultBox = document.getElementById('result');
        resultBox.style.display = "block";

        if (gpa >= 10) {
            resultBox.className = "result-box pass";
            resultBox.innerHTML = `المعدل الفصلي النهائي (السداسي 2): ${gpa.toFixed(2)} / 20 <br> الحالة العامة: ناجح ومقبول 🟢`;
        } else {
            resultBox.className = "result-box fail";
            resultBox.innerHTML = `المعدل الفصلي النهائي (السداسي 2): ${gpa.toFixed(2)} / 20 <br> الحالة العامة: راسب (دورة استدراكية) 🔴`;
        }
    }
</script>

</body>
</html>
