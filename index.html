<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة معدل العلوم الاجتماعية - جامعة الجزائر 2</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            color: #008080;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }
        th, td {
            padding: 12px 15px;
            text-align: right;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #008080;
            color: white;
        }
        input[type="number"] {
            width: 70px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        .btn-calc {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #008080;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-calc:hover {
            background-color: #005a5a;
        }
        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            display: none;
        }
        .pass {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .fail {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .text-pass { color: #28a745; font-weight: bold; }
        .text-fail { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>حاسبة معدل السداسي الأول - جامعة الجزائر 2</h1>
    
    <table>
        <thead>
            <tr>
                <th>المقياس</th>
                <th>نوع المادة</th>
                <th>المعامل</th>
                <th>علامة TD</th>
                <th>علامة الامتحان</th>
                <th>معدل المادة</th>
            </tr>
        </thead>
        <tbody id="subjects-table">
            </tbody>
    </table>

    <button class="btn-calc" onclick="calculateGPA()">احسب المعدل الفصلي</button>

    <div id="result" class="result-box"></div>
</div>

<script>
    // البيانات الافتراضية الدقيقة المطابقة لكشف نقاطك الحقيقي
    const subjects = [
        { name: "تاريخ الجزائر 1", coeff: 1, td: null, exam: 8.0, type: "lecture_only" },
        { name: "البحث الوثائقي 1", coeff: 1, td: null, exam: 7.5, type: "lecture_only" },
        { name: "مدخل إلى الأنثروبولوجيا", coeff: 2, td: 12.0, exam: 5.0, type: "both" },
        { name: "مدخل إلى الفلسفة", coeff: 2, td: 14.0, exam: 9.0, type: "both" },
        { name: "مدخل إلى علم النفس", coeff: 2, td: 13.0, exam: 7.5, type: "both" },
        { name: "مدخل إلى علم الاجتماع", coeff: 2, td: 16.0, exam: 8.5, type: "both" },
        { name: "إحصاء وصفي", coeff: 2, td: 14.0, exam: 9.33, type: "both" }, // تم تعديلها لتطابق الـ 11.2 تماماً في الكشف
        { name: "إبستمولوجيا العلوم الاجتماعية", coeff: 2, td: 14.0, exam: 10.0, type: "both" },
        { name: "مدخل إلى البرامج الحرة", coeff: 1, td: 20.0, exam: null, type: "td_only" },
        { name: "لغة إنجليزية", coeff: 1, td: 16.5, exam: null, type: "td_only" }
    ];

    const tableBody = document.getElementById('subjects-table');

    // توليد الأسطر داخل الجدول بناءً على البيانات
    subjects.forEach((sub, index) => {
        let typeText = sub.type === "both" ? "محاضرة + TD" : (sub.type === "td_only" ? "TD فقط" : "محاضرة فقط");
        let tdInput = sub.td !== null ? `<input type="number" id="td-${index}" value="${sub.td}" step="0.01" min="0" max="20" oninput="updateRow(${index})">` : '—';
        let examInput = sub.exam !== null ? `<input type="number" id="exam-${index}" value="${sub.exam}" step="0.01" min="0" max="20" oninput="updateRow(${index})">` : '—';
        
        let row = `
            <tr>
                <td><strong>${sub.name}</strong></td>
                <td><small>${typeText}</small></td>
                <td><input type="number" id="coeff-${index}" value="${sub.coeff}" min="1" max="5"></td>
                <td>${tdInput}</td>
                <td>${examInput}</td>
                <td id="sub-total-${index}">0.00</td>
            </tr>
        `;
        tableBody.innerHTML += row;
    });

    // دالة لتحديث معدل المادة الحالية فور تغيير أي نقطة
    function updateRow(index) {
        const sub = subjects[index];
        const coeff = parseFloat(document.getElementById(`coeff-${index}`).value) || 0;
        let finalScore = 0;

        if (sub.type === "both") {
            const td = parseFloat(document.getElementById(`td-${index}`).value) || 0;
            const exam = parseFloat(document.getElementById(`exam-${index}`).value) || 0;
            finalScore = (td * 0.4) + (exam * 0.6);
        } else if (sub.type === "td_only") {
            finalScore = parseFloat(document.getElementById(`td-${index}`).value) || 0;
        } else {
            finalScore = parseFloat(document.getElementById(`exam-${index}`).value) || 0;
        }

        const cell = document.getElementById(`sub-total-${index}`);
        cell.innerText = finalScore.toFixed(2);
        
        if (finalScore >= 10) {
            cell.className = "text-pass";
        } else {
            cell.className = "text-fail";
        }
        return { finalScore, coeff };
    }

    // دالة حساب المعدل العام للفصل
    function calculateGPA() {
        let totalPoints = 0;
        let totalCoeffs = 0;

        subjects.forEach((sub, index) => {
            let rowData = updateRow(index);
            totalPoints += rowData.finalScore * rowData.coeff;
            totalCoeffs += rowData.coeff;
        });

        const gpa = totalPoints / totalCoeffs;
        const resultBox = document.getElementById('result');
        resultBox.style.display = "block";

        if (gpa >= 10) {
            resultBox.className = "result-box pass";
            resultBox.innerHTML = `المعدل الفصلي النهائي هو: ${gpa.toFixed(2)} / 20 <br> الحالة العامة: ناجح ومقبول 🟢`;
        } else {
            resultBox.className = "result-box fail";
            resultBox.innerHTML = `المعدل الفصلي النهائي هو: ${gpa.toFixed(2)} / 20 <br> الحالة العامة: راسب (دورة استدراكية) 🔴`;
        }
    }

    // تشغيل الحساب المبدئي عند فتح الصفحة
    window.onload = calculateGPA;
</script>

</body>
</html>
